name: Quality Gates

# TypeScript + Expo health checks for PRs. No native Gradle build — native
# compile is validated on demand via EAS preview (preview-build label) and
# production releases (tag → EAS).

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  expo-doctor:
    name: expo-doctor
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      EXPO_PUBLIC_API_BASE_URL: http://localhost:9999
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run expo-doctor
        run: npx expo-doctor

  expo-install-check:
    name: expo install --check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      EXPO_PUBLIC_API_BASE_URL: http://localhost:9999
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check dependency versions
        run: npx expo install --check
