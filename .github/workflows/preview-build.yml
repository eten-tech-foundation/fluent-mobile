name: Preview Build

on:
  pull_request:
    types: [labeled]

concurrency:
  group: preview-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  EAS_PROJECT_ID: 'b0919574-f268-4768-b3bd-7cfa5172bbab'
  EAS_CHANNEL: 'preview'
  APP_SLUG: 'fluent-mobile'
  QA_GUIDE_URL: 'https://github.com/eten-tech-foundation/fluent-mobile/blob/main/docs/guides/qa-preview-testing.md'

jobs:
  preview-build:
    name: Create PR Preview
    runs-on: ubuntu-latest
    if: contains(github.event.label.name, 'preview-build')
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: 📋 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 🏗️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: 🏗️ Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Detect change type
        id: change-detection
        run: |
          set -euo pipefail
          BASE_REF="origin/${GITHUB_BASE_REF}"
          CHANGED_FILES=$(git diff --name-only "${BASE_REF}"...HEAD)

          # Config/plugins that require a new Android binary for preview
          HARD_NATIVE_PATTERNS="(^plugins/|eas\.json)"
          SOFT_DEP_PATTERNS="(package\.json|package-lock\.json)"
          NATIVE_DEP_PATTERN='^\+.*"(react-native-|@react-native-|expo-build-properties|expo-dev-client|expo-updates|@op-engineering/)'

          APP_CONFIG_CHANGED=0
          if echo "$CHANGED_FILES" | grep -q "app\.config\.\(js\|ts\)"; then
            APP_CONFIG_DIFF=$(git diff "${BASE_REF}"...HEAD app.config.js app.config.ts 2>/dev/null || echo "")

            if echo "$APP_CONFIG_DIFF" | grep -vE "^[+-]const APP_VERSION_FALLBACK" | grep -q "^[+-][^+-]"; then
              APP_CONFIG_CHANGED=1
              echo "📝 app.config has native changes (not just version)"
            else
              echo "📝 app.config has version-only changes (safe for OTA)"
            fi
          fi

          HARD_NATIVE_FILES=$(echo "$CHANGED_FILES" | { grep -E "$HARD_NATIVE_PATTERNS" || true; } | wc -l | tr -d ' ')
          SOFT_DEP_FILES=$(echo "$CHANGED_FILES" | { grep -E "$SOFT_DEP_PATTERNS" || true; } | wc -l | tr -d ' ')

          CHANGE_TYPE="js-only"
          if [ "$HARD_NATIVE_FILES" -gt 0 ] || [ "$APP_CONFIG_CHANGED" -eq 1 ]; then
            CHANGE_TYPE="native"
          elif [ "$SOFT_DEP_FILES" -gt 0 ]; then
            PKG_DIFF=$(git diff "${BASE_REF}"...HEAD package.json 2>/dev/null || echo "")
            if echo "$PKG_DIFF" | grep -qE "$NATIVE_DEP_PATTERN"; then
              CHANGE_TYPE="native"
              echo "🔧 Native dependency changes in package.json - Android build required"
            fi
          fi

          echo "change_type=${CHANGE_TYPE}" >> $GITHUB_OUTPUT
          if [ "$CHANGE_TYPE" = "native" ]; then
            echo "🔧 Native changes detected - Android build required"
            echo "$CHANGED_FILES" | { grep -E "$HARD_NATIVE_PATTERNS" || true; }
            if [ "$APP_CONFIG_CHANGED" -eq 1 ]; then
              echo "  - app.config.ts (native changes)"
            fi
          else
            echo "📱 JS-only changes - OTA update possible"
            if [ "$SOFT_DEP_FILES" -gt 0 ]; then
              echo "ℹ️ package.json / package-lock.json changed — using OTA preview"
              echo "$CHANGED_FILES" | { grep -E "$SOFT_DEP_PATTERNS" || true; }
            fi
          fi

      - name: 📊 Resolve preview version
        id: preview-version
        run: |
          set -euo pipefail
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LATEST_TAG" ]; then
            VERSION_SOURCE="git tag ${LATEST_TAG}"
            BASE_VERSION=${LATEST_TAG#v}
            BASE_VERSION="${BASE_VERSION%%[-+]*}"
          else
            BASE_VERSION=$(grep -E "^const APP_VERSION_FALLBACK" app.config.ts | sed -E "s/.*'([^']+)'.*/\1/" || true)
            if [ -n "$BASE_VERSION" ]; then
              VERSION_SOURCE="app.config.ts"
            else
              BASE_VERSION=$(node -p "require('./package.json').version")
              VERSION_SOURCE="package.json"
            fi
            echo "ℹ️ No git tags found — using ${VERSION_SOURCE} version: ${BASE_VERSION}"
          fi

          PREVIEW_ID="pr-${{ github.event.pull_request.number }}-${GITHUB_SHA:0:7}"

          echo "VERSION_SOURCE=$VERSION_SOURCE" >> $GITHUB_OUTPUT
          echo "BASE_VERSION=$BASE_VERSION" >> $GITHUB_OUTPUT
          echo "PREVIEW_ID=$PREVIEW_ID" >> $GITHUB_OUTPUT
          echo "✅ Preview base version: $BASE_VERSION (ID: $PREVIEW_ID, source: $VERSION_SOURCE)"

      - name: 🚀 Create Preview OTA Update
        if: steps.change-detection.outputs.change_type == 'js-only'
        id: ota-update
        env:
          APP_VERSION: ${{ steps.preview-version.outputs.BASE_VERSION }}
          EAS_UPDATE_CHANNEL: preview
          PREVIEW_ID: ${{ steps.preview-version.outputs.PREVIEW_ID }}
          BASE_VERSION: ${{ steps.preview-version.outputs.BASE_VERSION }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          UPDATE_MESSAGE="Preview ${BASE_VERSION} (PR #${PR_NUMBER}): ${PR_TITLE}"

          echo "Creating preview update: $UPDATE_MESSAGE"

          UPDATE_OUTPUT=$(npx eas update \
            --branch preview \
            --message "$UPDATE_MESSAGE" \
            --json \
            --non-interactive)

          JSON_ARRAY=$(echo "$UPDATE_OUTPUT" | sed -n '/^\[/,/^\]/p')

          if echo "$JSON_ARRAY" | jq empty 2>/dev/null; then
            UPDATE_GROUP_ID=$(echo "$JSON_ARRAY" | jq -r '.[0].group')
            ACTUAL_RUNTIME_VERSION=$(echo "$JSON_ARRAY" | jq -r '.[0].runtimeVersion // empty')
            echo "✅ Successfully parsed JSON - Group ID: $UPDATE_GROUP_ID"
          else
            echo "❌ JSON parsing failed, using fallback method"
            JSON_ARRAY=$(echo "$UPDATE_OUTPUT" | grep -A 50 '^\[' | grep -B 50 '^\]' | head -n -1)
            UPDATE_GROUP_ID=$(echo "$JSON_ARRAY" | jq -r '.[0].group // empty')
            ACTUAL_RUNTIME_VERSION=$(echo "$JSON_ARRAY" | jq -r '.[0].runtimeVersion // empty')
          fi

          BASE_VERSION="${{ steps.preview-version.outputs.BASE_VERSION }}"
          RUNTIME_VERSION=${ACTUAL_RUNTIME_VERSION:-$BASE_VERSION}
          CACHE_BUSTER="${{ github.sha }}"
          if [ -n "$UPDATE_GROUP_ID" ] && [ "$UPDATE_GROUP_ID" != "null" ]; then
            MANIFEST_URL="https://u.expo.dev/${EAS_PROJECT_ID}/group/${UPDATE_GROUP_ID}"
          else
            MANIFEST_URL="https://u.expo.dev/${EAS_PROJECT_ID}?channel-name=${EAS_CHANNEL}&runtime-version=${RUNTIME_VERSION}"
          fi
          ENCODED_MANIFEST=$(node -e "console.log(encodeURIComponent(process.argv[1]))" "$MANIFEST_URL")
          DEEP_LINK_URL="exp+${APP_SLUG}://expo-development-client/?url=${ENCODED_MANIFEST}"
          QR_IMG_URL="https://qr.expo.dev/eas-update?projectId=${EAS_PROJECT_ID}&runtimeVersion=${RUNTIME_VERSION}&channel=${EAS_CHANNEL}&slug=${APP_SLUG}&v=${CACHE_BUSTER:0:8}"

          echo "UPDATE_GROUP_ID=$UPDATE_GROUP_ID" >> $GITHUB_OUTPUT
          echo "PREVIEW_ID=${{ steps.preview-version.outputs.PREVIEW_ID }}" >> $GITHUB_OUTPUT
          echo "BASE_VERSION=$BASE_VERSION" >> $GITHUB_OUTPUT
          echo "RUNTIME_VERSION=$RUNTIME_VERSION" >> $GITHUB_OUTPUT
          echo "QR_IMG_URL=$QR_IMG_URL" >> $GITHUB_OUTPUT
          echo "DEEP_LINK_URL=$DEEP_LINK_URL" >> $GITHUB_OUTPUT

          echo "✅ Preview update completed (Group ID: $UPDATE_GROUP_ID)"
          sleep 10

      - name: 💬 Post Preview Comment
        if: steps.change-detection.outputs.change_type == 'js-only'
        uses: actions/github-script@v7
        with:
          script: |
            const updateGroupId = "${{ steps.ota-update.outputs.UPDATE_GROUP_ID }}";
            const previewId = "${{ steps.ota-update.outputs.PREVIEW_ID }}";
            const baseVersion = "${{ steps.ota-update.outputs.BASE_VERSION }}";
            const runtimeVersion = "${{ steps.ota-update.outputs.RUNTIME_VERSION }}";
            const qrImgUrl = "${{ steps.ota-update.outputs.QR_IMG_URL }}";
            const deepLinkUrl = "${{ steps.ota-update.outputs.DEEP_LINK_URL }}";
            const projectId = "${{ env.EAS_PROJECT_ID }}";

            const qaGuideUrl = "${{ env.QA_GUIDE_URL }}";

            const body = [
              '## 📲 Preview update ready (Android)',
              '',
              `**Preview ID:** \`${previewId}\` · **Runtime version:** \`${runtimeVersion}\``,
              '',
              'This PR published a **JavaScript-only** preview update. It loads inside the **Fluent dev client** — **not Expo Go**.',
              '',
              '### Before you start',
              '',
              '1. On your Android phone, install the **Fluent** app (dev client). If you do not have it yet, ask your team for the latest preview APK from a prior PR, or wait for a **native preview build** on this PR.',
              '2. **Do not** install or use **Expo Go** from the Play Store — it will not work with Fluent.',
              `3. Your installed Fluent app must use **runtime version \`${runtimeVersion}\`**. If the steps below fail, this PR may need a native preview APK first (re-add the \`preview-build\` label after native changes).`,
              '',
              `**Full step-by-step guide (non-technical):** [How to test a PR preview](${qaGuideUrl})`,
              '',
              '### Load this preview on your phone',
              '',
              '**Option A — Tap the link (easiest)**',
              '',
              'Open this page **on your Android phone** (not a laptop), then tap:',
              '',
              `**[Open preview in Fluent](${deepLinkUrl})**`,
              '',
              'Fluent should open and download the preview. If prompted, allow the app to open the link.',
              '',
              '**Option B — Scan the QR code**',
              '',
              '1. Open the **Fluent** app on your phone (you should see the dev client / project screen).',
              '2. Tap **Scan QR code** (or use your phone **Camera** app on the code below — it should offer to open **Fluent**, not Expo Go).',
              '3. Wait for the update to load, then open the project.',
              '',
              `<a href="https://expo.dev/projects/${projectId}/updates/${updateGroupId}">`,
              `<img src="${qrImgUrl}" width="256" height="256" alt="QR code to load this preview in the Fluent dev client" style="border: 1px solid #ccc; border-radius: 8px; max-width: 100%; height: auto;" />`,
              '</a>',
              '',
              '**Option C — Already in Fluent**',
              '',
              'Fully close Fluent (swipe it away), reopen it, and wait a few seconds on the dev client screen — it may fetch the latest preview on the `preview` channel automatically.',
              '',
              '### After the preview loads',
              '',
              '- Sign in and run through the test steps for this PR.',
              '- If the app looks unchanged, force-close Fluent and try **Option A** again.',
              '',
              '### Details',
              '',
              '| | |',
              '|---|---|',
              `| Preview ID | \`${previewId}\` |`,
              `| Base version | \`${baseVersion}\` |`,
              '| Channel | `preview` |',
              `| Runtime version | \`${runtimeVersion}\` |`,
              `| Commit | \`${{ github.event.pull_request.head.sha }}\` |`,
              '',
              '### Links',
              '',
              `- [Expo update dashboard](https://expo.dev/projects/${projectId}/updates/${updateGroupId})`,
              `- [PR #${{ github.event.pull_request.number }}](https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }})`,
              '',
              '---',
              '*OTA preview only — not a Play Store release. If this PR changed native code (`app.config.ts`, plugins, or native dependencies), use the **Android preview APK** comment instead.*',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComments = comments.filter(comment =>
              comment.user.login === 'github-actions[bot]' &&
              (comment.body.includes('📲 Preview update ready') ||
               comment.body.includes('📲 Preview Build Ready!'))
            );

            for (const comment of botComments) {
              try {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              } catch (error) {
                console.log(`⚠️ Could not delete comment ${comment.id}: ${error.message}`);
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: 📊 Compute native build version
        if: steps.change-detection.outputs.change_type == 'native'
        id: base-version
        run: |
          set -euo pipefail
          CURRENT_VERSION="${{ steps.preview-version.outputs.BASE_VERSION }}"
          CURRENT_VERSION="${CURRENT_VERSION%%[-+]*}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}
          NEXT_PATCH=$((PATCH + 1))
          BUILD_VERSION="$MAJOR.$MINOR.$NEXT_PATCH"

          echo "BASE_VERSION=$BUILD_VERSION" >> $GITHUB_OUTPUT
          echo "PREVIEW_ID=${{ steps.preview-version.outputs.PREVIEW_ID }}" >> $GITHUB_OUTPUT
          echo "✅ Android preview build version: $BUILD_VERSION (from base $CURRENT_VERSION)"
          echo "   Preview ID: ${{ steps.preview-version.outputs.PREVIEW_ID }}"

      - name: 🚀 Start Android Preview Build
        if: steps.change-detection.outputs.change_type == 'native'
        id: native-builds
        env:
          BUILD_MESSAGE: "Preview ${{ steps.base-version.outputs.BASE_VERSION }} - PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
          PREVIEW_ID: ${{ steps.base-version.outputs.PREVIEW_ID }}
          BASE_VERSION: ${{ steps.base-version.outputs.BASE_VERSION }}
          APP_VERSION: ${{ steps.base-version.outputs.BASE_VERSION }}
        run: |
          echo "Starting Android preview build..."
          echo "Version: $BASE_VERSION (Preview ID: $PREVIEW_ID)"

          # Bake version into uploaded app.config — avoids unresolved $APP_VERSION on EAS
          sed -i "s/^const APP_VERSION_FALLBACK = '[^']*'/const APP_VERSION_FALLBACK = '${BASE_VERSION}'/" app.config.ts
          echo "Using app version: $(grep -E '^const APP_VERSION_FALLBACK' app.config.ts)"

          ANDROID_OUTPUT=$(npx eas build \
            --platform android \
            --profile preview \
            --message "$BUILD_MESSAGE" \
            --json \
            --non-interactive)

          ANDROID_BUILD_ID=$(echo "$ANDROID_OUTPUT" | jq -r '.[] | select(.platform=="android") | .id')
          echo "ANDROID_BUILD_ID=$ANDROID_BUILD_ID" >> $GITHUB_OUTPUT
          echo "Android build started: $ANDROID_BUILD_ID (version $BASE_VERSION)"

      - name: 💬 Post Native Preview Comment
        if: steps.change-detection.outputs.change_type == 'native'
        uses: actions/github-script@v7
        with:
          script: |
            const androidId = "${{ steps.native-builds.outputs.ANDROID_BUILD_ID }}";
            const previewId = "${{ steps.base-version.outputs.PREVIEW_ID }}";
            const baseVersion = "${{ steps.base-version.outputs.BASE_VERSION }}";

            const qaGuideUrl = "${{ env.QA_GUIDE_URL }}";

            const body = [
              '## 🔧 Fluent preview app building (Android)',
              '',
              `**Preview ID:** \`${previewId}\` · **App version:** \`${baseVersion}\``,
              '',
              'This PR changed **native** code, so QA needs a **new Fluent dev client APK** (not Expo Go). A build is running on EAS.',
              '',
              `**Full install guide:** [How to test a PR preview](${qaGuideUrl})`,
              '',
              '### Build status',
              '',
              `- **Android APK:** [${androidId}](https://expo.dev/builds/${androidId}) — 🟡 building (~10–15 minutes)`,
              '',
              'Refresh the build page until status is **Finished**.',
              '',
              '### When the build finishes — install on your phone',
              '',
              '1. On your **Android phone**, open the build link above (you may need to sign in to [expo.dev](https://expo.dev)).',
              '2. Tap **Download** / **Install** to get the **Fluent** APK.',
              '3. If Android blocks the install: **Settings → Security** (or **Install unknown apps**) → allow your browser or **Files** app to install apps.',
              '4. Open **Fluent** — you should see the **dev client** screen (not Expo Go).',
              '5. Keep this build installed. **Future JS-only previews** on other PRs can load via QR code or link without reinstalling, as long as **runtime version** still matches.',
              '',
              '### ⚠️ Not Expo Go',
              '',
              'Fluent uses a **custom dev client**. The Expo Go app from the Play Store **cannot** run these previews.',
              '',
              '### Links',
              '',
              `- [EAS build page](https://expo.dev/builds/${androidId})`,
              `- [PR #${{ github.event.pull_request.number }}](https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }})`,
              '',
              '---',
              `*Native preview APK (\`${baseVersion}\`, ID: \`${previewId}\`). Android only.*`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComments = comments.filter(comment =>
              comment.user.login === 'github-actions[bot]' &&
              (comment.body.includes('📲 Preview update ready') ||
               comment.body.includes('📲 Preview Build Ready!') ||
               comment.body.includes('🔧 Fluent preview app building') ||
               comment.body.includes('🔧 Android Preview Build Started!'))
            );

            for (const comment of botComments) {
              try {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              } catch (error) {
                console.log(`⚠️ Could not delete comment ${comment.id}: ${error.message}`);
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
